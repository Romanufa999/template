<script>
  (function () {
    const toggle = document.getElementById('mobile-menu-toggle');
    const menu = document.getElementById('mobile-menu');
    const iconOpen = document.getElementById('menu-icon-open');
    const iconClose = document.getElementById('menu-icon-close');
    const navLinks = menu.querySelectorAll('.mobile-nav-link');
    let isOpen = false;

    function openMenu() {
      isOpen = true;
      toggle.setAttribute('aria-expanded', 'true');
      menu.classList.remove('pointer-events-none', 'opacity-0');
      menu.classList.add('pointer-events-auto', 'opacity-100');
      iconOpen.classList.add('opacity-0', 'scale-75', 'rotate-90');
      iconOpen.classList.remove('opacity-100', 'scale-100', 'rotate-0');
      iconClose.classList.remove('opacity-0', 'scale-75');
      iconClose.classList.add('opacity-100', 'scale-100');
      document.body.style.overflow = 'hidden';
      navLinks.forEach(function (link) {
        link.classList.remove('translate-y-4', 'opacity-0');
        link.classList.add('translate-y-0', 'opacity-100');
      });
    }

    function closeMenu() {
      isOpen = false;
      toggle.setAttribute('aria-expanded', 'false');
      navLinks.forEach(function (link) {
        link.classList.add('translate-y-4', 'opacity-0');
        link.classList.remove('translate-y-0', 'opacity-100');
      });
      setTimeout(function () {
        menu.classList.add('pointer-events-none', 'opacity-0');
        menu.classList.remove('pointer-events-auto', 'opacity-100');
      }, 200);
      iconOpen.classList.remove('opacity-0', 'scale-75', 'rotate-90');
      iconOpen.classList.add('opacity-100', 'scale-100', 'rotate-0');
      iconClose.classList.add('opacity-0', 'scale-75');
      iconClose.classList.remove('opacity-100', 'scale-100');
      document.body.style.overflow = '';
    }

    toggle.addEventListener('click', function () {
      if (isOpen) {
        closeMenu();
      } else {
        openMenu();
      }
    });

    // Close menu when a nav link is clicked
    navLinks.forEach(function (link) {
      if (link.tagName === 'A') {
        link.addEventListener('click', function () {
          closeMenu();
        });
      }
    });

    // Close on Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && isOpen) {
        closeMenu();
      }
    });

    // Smooth scroll for all anchor links
    document.querySelectorAll('a[href^="#"]').forEach(function (anchor) {
      anchor.addEventListener('click', function (e) {
        var targetId = this.getAttribute('href');
        if (targetId && targetId !== '#') {
          var target = document.querySelector(targetId);
          if (target) {
            e.preventDefault();
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }
      });
    });

    // Navbar background enhancement on scroll
    var navbar = document.getElementById('navbar');
    window.addEventListener('scroll', function () {
      if (window.scrollY > 20) {
        navbar.classList.remove('bg-black/50');
        navbar.classList.add('bg-black/80');
      } else {
        navbar.classList.remove('bg-black/80');
        navbar.classList.add('bg-black/50');
      }
    }, { passive: true });
  })();
</script>
